# ============================================================================
# monitor.yml — Motor do observatório (GitHub Actions).
#
# A cada 6 horas (e sob demanda via workflow_dispatch) consulta o SGS/BACEN,
# atualiza os snapshots em data/ e o CHANGELOG.md, e commita/empurra de volta
# SOMENTE quando algo mudou. Custo zero, idempotente.
# ============================================================================
name: monitor

on:
  schedule:
    - cron: "0 */6 * * *"   # a cada 6 horas (UTC)
  workflow_dispatch:         # execução manual pela aba Actions

permissions:
  contents: write            # necessário para o commit/push automático

# Evita execuções concorrentes pisando umas nas outras.
concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    # Exposto ao job inteiro; vazio se o secret não estiver configurado.
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      # Dependência opcional do resumo em linguagem natural (diff_summary.py).
      # Só instala se o secret ANTHROPIC_API_KEY estiver definido.
      - name: Instalar dependência opcional (resumo NL)
        if: env.ANTHROPIC_API_KEY != ''
        run: pip install anthropic

      - name: Coletar séries do SGS/BACEN
        run: python scripts/fetch.py

      - name: Gerar páginas programáticas de reajuste
        run: python scripts/build_pages.py

      - name: Gerar calculadora de correção monetária
        run: python scripts/build_correcao.py

      - name: Commit + push se houver mudança
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          [ -f CHANGELOG.md ] && git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "Nenhuma mudança — nada a commitar."
          else
            git commit -m "chore: snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
